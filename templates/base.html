<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f8; display: flex; }

        .sidebar {
            width: 220px; min-height: 100vh; background: #1a1a2e;
            padding: 24px 0; position: fixed;
        }
        .sidebar h1 {
            color: #fff; font-size: 18px; padding: 0 24px 24px;
            border-bottom: 1px solid #2a2a4a;
        }
        .sidebar a {
            display: block; color: #aaa; text-decoration: none;
            padding: 12px 24px; font-size: 14px; transition: all 0.2s;
        }
        .sidebar a:hover, .sidebar a.ativo { background: #2a2a4a; color: #fff; }

        .conteudo { margin-left: 220px; padding: 32px; width: 100%; }
        .cabecalho { margin-bottom: 24px; }
        .cabecalho h2 { font-size: 22px; color: #1a1a2e; }
        .cabecalho p { color: #888; font-size: 14px; margin-top: 4px; }

        .card {
            background: #fff; border-radius: 10px;
            padding: 24px; margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .btn {
            display: inline-block; padding: 8px 18px; border-radius: 6px;
            border: none; cursor: pointer; font-size: 14px; text-decoration: none;
        }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-success { background: #2e7d52; color: #fff; }
        .btn-danger { background: #c0392b; color: #fff; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; font-size: 13px;
             color: #888; border-bottom: 1px solid #eee; }
        td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
        }
        .badge-verde { background: #e6f4ee; color: #2e7d52; }
        .badge-amarelo { background: #fef3e2; color: #8a5a00; }
        .badge-vermelho { background: #fce8e8; color: #b03030; }
    </style>
</head>
<body>
    <div class="sidebar">
    <h1>Financeiro</h1>
    <div style="margin: 0 16px 20px; background: #2a2a4a; border-radius: 8px; padding: 12px 14px;">
    <p style="font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em;">Mês de referência</p>
    <p style="font-size: 16px; font-weight: 700; color: #fff;">
        {{ mes_atual }}
    </p>
</div>
    <a href="/" class="{{ 'ativo' if request.path == '/' }}">Painel</a>
    <a href="/receitas" class="{{ 'ativo' if request.path == '/receitas' }}">Receitas</a>
    <a href="/clientes" class="{{ 'ativo' if request.path == '/clientes' }}">Clientes</a>
    <a href="/despesas-fixas" class="{{ 'ativo' if request.path == '/despesas-fixas' }}">Despesas Fixas</a>
    <a href="/despesas-variaveis" class="{{ 'ativo' if request.path == '/despesas-variaveis' }}">Despesas Variáveis</a>
    <a href="/parcelas" class="{{ 'ativo' if request.path == '/parcelas' }}">Parcelas</a>
    <a href="/importar" class="{{ 'ativo' if request.path == '/importar' }}">Importar Excel</a>
</div>
    <div class="conteudo">
        {% block conteudo %}{% endblock %}
    </div>
</body>
</html>
