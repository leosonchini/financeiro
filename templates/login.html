<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo span {
            font-size: 11px;
            color: #6366f1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: block;
            margin-bottom: 4px;
        }
        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.5px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 6px;
        }
        .card p {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #111827;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .btn {
            width: 100%;
            padding: 11px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 8px;
        }
        .btn:hover { background: #4f46e5; }
        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
        }
        .link a { color: #6366f1; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
        .erro {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span>Sistema</span>
            <h1>Financeiro</h1>
        </div>
        <div class="card">
            <h2>Bem-vindo de volta</h2>
            <p>Entre com sua conta para continuar</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                <div class="erro">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            <form method="POST">
                <div class="field">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="seu@email.com" required>
                </div>
                <div class="field">
                    <label>Senha</label>
                    <input type="password" name="senha" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </div>
        <div class="link">
            Não tem conta? <a href="/cadastro">Cadastre-se grátis</a>
        </div>
    </div>
</body>
</html>
